<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Insumo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container col-md-6">
        <h2 class="mb-1">✏️ Editar Insumo</h2>
        <p class="text-muted mb-4">
            Tipo:
            <span th:if="${insumo.tieneMedida}" class="badge bg-info text-dark">Por medida</span>
            <span th:unless="${insumo.tieneMedida}" class="badge bg-secondary">Por unidad</span>
            <small class="d-block mt-1">El tipo no se puede cambiar una vez creado el insumo.</small>
        </p>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/inventario/insumo/{id}/editar(id=${insumo.id})}" method="post" class="bg-white p-4 shadow-sm border rounded">

            <div class="mb-3">
                <label class="form-label fw-bold">Nombre del insumo</label>
                <input type="text" name="nombre" class="form-control" th:value="${insumo.nombre}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3" th:text="${insumo.descripcion}"></textarea>
            </div>

            <div th:unless="${insumo.tieneMedida}" class="mb-3">
                <p class="text-muted mb-0">
                    Stock actual: <strong th:text="${insumo.stockUnidades} + ' unidad(es)'"></strong>
                    <br><small>Para cambiar el stock, usa "+ Cargar stock" desde el inventario.</small>
                </p>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success w-100">Guardar cambios</button>
                <a href="/inventario" class="btn btn-secondary w-100 mt-2">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
