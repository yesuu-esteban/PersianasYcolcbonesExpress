<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pedidos de Tienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .badge-estado-pedido    { background-color: #6c757d; }
        .badge-estado-bodega    { background-color: #0dcaf0; color: #000; }
        .badge-estado-instalado { background-color: #ffc107; color: #000; }
        .badge-estado-terminado { background-color: #198754; }
    </style>
</head>
<body class="bg-light p-4">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>🛒 Pedidos de Tienda</h2>
            <a href="/tienda/nuevo" class="btn btn-primary">+ Nuevo Pedido</a>
        </div>

        <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <table class="table table-hover shadow-sm bg-white align-middle table-sm">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Cliente</th>
                    <th>Teléfono</th>
                    <th>Vendedor</th>
                    <th>Fecha pedido</th>
                    <th>Fecha entrega</th>
                    <th>Total</th>
                    <th>Abono</th>
                    <th>Saldo</th>
                    <th>Estado</th>
                    <th>Cambiar estado</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${pedidos}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.nombreCliente}"></td>
                    <td th:text="${p.telefono}"></td>
                    <td th:text="${p.vendedor}"></td>
                    <td th:text="${#temporals.format(p.fechaPedido, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <span th:if="${p.fechaEntrega != null}"
                              th:text="${#temporals.format(p.fechaEntrega, 'dd/MM/yyyy HH:mm')}"></span>
                        <span th:unless="${p.fechaEntrega != null}" class="text-muted">Sin definir</span>
                    </td>
                    <td th:text="${p.total}"></td>
                    <td th:text="${p.abono}"></td>
                    <td th:text="${p.saldo}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${p.estado == 'Pedido' ? 'badge-estado-pedido' :
                                               (p.estado == 'En Bodega' ? 'badge-estado-bodega' :
                                               (p.estado == 'Instalado' ? 'badge-estado-instalado' : 'badge-estado-terminado'))}"
                              th:text="${p.estado}"></span>
                    </td>
                    <td>
                        <form th:action="@{/tienda/actualizar-estado/{id}(id=${p.id})}" method="post" class="d-flex gap-1">
                            <select name="estado" class="form-select form-select-sm" style="width:140px;">
                                <option value="Pedido"     th:selected="${p.estado == 'Pedido'}">Pedido</option>
                                <option value="En Bodega"  th:selected="${p.estado == 'En Bodega'}">En Bodega</option>
                                <option value="Instalado"  th:selected="${p.estado == 'Instalado'}">Instalado</option>
                                <option value="Terminado"  th:selected="${p.estado == 'Terminado'}">Terminado</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-outline-primary">💾</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(pedidos)}" class="alert alert-light border text-center text-muted">
            No hay pedidos de tienda registrados todavía.
        </div>
    </div>
</body>
</html>
