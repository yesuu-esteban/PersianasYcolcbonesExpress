<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Pedido de Tienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a0f2e;
            --bg-card: #2a1b42;
            --accent: #ec1561;
            --accent-light: #ff4d94;
            --gold: #ffc107;
            --text-muted: #c9bfe0;
        }

        * { font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(160deg, #1a0f2e 0%, #241536 100%);
            color: #fff;
            padding: 24px;
            min-height: 100vh;
        }

        /* ── Sello de marca ── */
        .marca-header {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-card);
            border: 1px solid rgba(236,21,97,0.35);
            border-radius: 14px;
            padding: 16px 24px;
            margin-bottom: 26px;
            box-shadow: 0 4px 22px rgba(236,21,97,0.15);
        }
        .marca-header .icono {
            width: 46px; height: 46px;
            background: linear-gradient(135deg, var(--accent), #a5107f);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 0 0 3px rgba(236,21,97,0.25);
            flex-shrink: 0;
        }
        .marca-header .titulo-marca {
            font-weight: 800;
            font-size: 1.05rem;
            line-height: 1.1;
            letter-spacing: 0.3px;
        }
        .marca-header .titulo-marca small {
            display: block;
            font-weight: 600;
            font-size: 0.6rem;
            color: var(--gold);
            letter-spacing: 1.5px;
            margin-top: 2px;
        }

        h2 { font-weight: 700; }

        .alert-danger { background: rgba(231,76,60,0.15); border: 1px solid #e74c3c; color: #ff9a90; }

        /* ── Tarjeta del formulario ── */
        .card-formulario {
            background: var(--bg-card) !important;
            border: 1px solid rgba(255,255,255,0.08) !important;
            border-radius: 14px;
            box-shadow: 0 4px 22px rgba(0,0,0,0.3);
        }

        .form-label { color: var(--text-muted); font-size: 0.85rem; }

        .form-control, .form-select {
            background: #1e1330;
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
        }
        .form-control:focus, .form-select:focus {
            background: #1e1330;
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 0 0.2rem rgba(236,21,97,0.25);
        }
        .form-control::placeholder { color: #8f84a8; }
        .form-select option { background: #1e1330; color: #fff; }

        hr { border-color: rgba(255,255,255,0.12); }

        /* ── Tabla de productos ── */
        table.table { color: #fff; }
        table.table thead th {
            background: #1e1330;
            border-color: rgba(255,255,255,0.1);
            color: var(--text-muted);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        table.table td { border-color: rgba(255,255,255,0.08); vertical-align: middle; }

        .btn-success {
            background: linear-gradient(135deg, var(--accent), #b81050) !important;
            border: none !important;
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(236,21,97,0.35);
        }
        .btn-success:hover { filter: brightness(1.12); }

        .btn-secondary {
            background: rgba(255,255,255,0.08) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            color: #fff !important;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.16) !important; }

        .text-muted { color: var(--text-muted) !important; }
    </style>
</head>
<body class="p-4">
<div class="container col-md-8">

    <div class="marca-header">
        <div class="icono">⚙️</div>
        <div class="titulo-marca">
            PERSIANAS Y CORTINAS EXPRESS
            <small>PUNTO DE FÁBRICA</small>
        </div>
    </div>

    <h2 class="mb-4">🛒 Nuevo Pedido de Tienda</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/tienda/guardar}" th:object="${pedidoTienda}" method="post"
          class="card-formulario p-4">

        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">Cliente</label>
                <input type="text" th:field="*{nombreCliente}" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Teléfono</label>
                <input type="text" th:field="*{telefono}" class="form-control">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Dirección</label>
            <input type="text" th:field="*{direccion}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Descripción</label>
            <textarea th:field="*{descripcion}" class="form-control" rows="2"
                      placeholder="Ej: Persianas para sala y comedor, instalación incluida"></textarea>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">Vendedor</label>
                <select th:field="*{vendedor}" class="form-select" required>
                    <option value="">-- Selecciona --</option>
                    <option value="Fabián Andrés">Fabián Andrés</option>
                    <option value="Carlos Andrés">Carlos Andrés</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Fecha de entrega</label>
                <input type="datetime-local" th:field="*{fechaEntrega}" class="form-control">
            </div>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">Abono</label>
                <input type="number" step="0.01" th:field="*{abono}" class="form-control">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Método de pago</label>
                <input type="text" th:field="*{metodoPago}" class="form-control">
            </div>
        </div>

        <hr>
        <h5 class="mb-3">Productos</h5>
        <p class="text-muted" style="font-size:0.82rem;">La cantidad y el precio unitario deben ser mayores a 0.</p>

        <table class="table table-sm" id="tablaDetalles">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio unitario</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="detalle, iter : *{detalles}">
                    <td>
                        <input type="text" class="form-control form-control-sm"
                               th:field="*{detalles[__${iter.index}__].producto}">
                    </td>
                    <td>
                        <input type="number" class="form-control form-control-sm" min="1" step="1" required
                               th:field="*{detalles[__${iter.index}__].cantidad}">
                    </td>
                    <td>
                        <input type="number" step="0.01" min="0.01" class="form-control form-control-sm" required
                               th:field="*{detalles[__${iter.index}__].precioUnitario}">
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="mt-4">
            <button type="submit" class="btn btn-success w-100">Guardar Pedido</button>
            <a href="/tienda/listado" class="btn btn-secondary w-100 mt-2">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
