<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Impresión de Orden</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 10px; }
        .etiqueta { 
            border: 2px solid #000; 
            padding: 15px; 
            margin-bottom: 15px; 
            width: 350px; 
            box-sizing: border-box; 
        }
        h3 { margin: 0 0 10px 0; border-bottom: 2px solid #333; font-size: 1.2rem; }
        p { margin: 4px 0; font-size: 1rem; }
        .destacado { font-weight: bold; color: #000; }
        .lado-control { font-size: 1.2rem; font-weight: bold; color: #d9534f; }
        .sistema-tipo { font-weight: bold; color: #000; text-transform: uppercase; }
    </style>
</head>
<body onload="window.print()">

    <div class="etiqueta">
        <h3>✂️ Corte de Tela</h3>
        <p><strong>Color:</strong> <span th:text="${pedido.colorTelaDeseado}"></span></p>
        <p><strong>Referencia:</strong> <span th:text="${pedido.rolloParaCortar}"></span></p>
        <p><strong>Medida:</strong> <span th:text="${#numbers.formatDecimal(pedido.corteTelaAncho, 1, 3) + ' x ' + #numbers.formatDecimal(pedido.corteTelaAlto, 1, 3)}"></span>m</p>
    </div>

    <div class="etiqueta">
        <h3>📏 Corte de Tubería / Perfilería</h3>
        <p><strong>Medida Corte:</strong> <span th:text="${#numbers.formatDecimal(pedido.corteTuberia, 1, 3)}"></span>m</p>
        <p><strong>Tipo Tubo:</strong> <span th:text="${pedido.tuboRecomendado}"></span></p>
        <p th:if="${pedido.usaCabezal}"><strong>Medida Cabezal:</strong> <span th:text="${#numbers.formatDecimal(pedido.medidaCabezal, 1, 3)}"></span>m</p>
    </div>

    <div class="etiqueta">
        <h3>📦 Identificación Final</h3>
        <p><strong>Distribuidor:</strong> <span th:text="${pedido.nombreDecorador}"></span></p>
        <p><strong>Cliente Final:</strong> <span th:text="${pedido.nombreClienteFinal}"></span></p>
        <p><strong>Descripción:</strong> <span th:text="${pedido.descripcion}"></span></p>
        <p><strong>Medida Final:</strong> <span th:text="${pedido.ancho + 'm x ' + pedido.altura + 'm'}"></span></p>
        <p><strong>Sistema:</strong> <span class="sistema-tipo" th:text="${pedido.tipoSistema}"></span></p>
        <p><strong>Tipo de Control:</strong> <span th:text="${pedido.tipoControl}"></span></p>
        <p><strong>Mando:</strong> <span class="lado-control" th:text="${pedido.ladoControl}"></span></p>
        <p><strong>Cuerda:</strong> <span class="destacado" th:text="${pedido.medidaCuerda}"></span></p>
    </div>

</body>
</html>
