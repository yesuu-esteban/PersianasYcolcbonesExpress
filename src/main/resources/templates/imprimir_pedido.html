<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Impresión de Orden</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 10px; }
        .etiqueta { border: 2px solid #000; padding: 15px; margin-bottom: 15px; width: 350px; }
        h3 { margin: 0 0 10px 0; border-bottom: 2px solid #333; font-size: 1.2rem; }
        p { margin: 5px 0; font-size: 1rem; }
        .destacado { font-weight: bold; color: #000; }
    </style>
</head>
<body onload="window.print()">

    <div class="etiqueta">
        <h3>✂️ Corte de Tela</h3>
        <p><strong>Color:</strong> <span th:text="${pedido.colorTelaDeseado}"></span></p>
        <p><strong>Material (Rollo):</strong> <span th:text="${pedido.rolloParaCortar}"></span></p>
        <p><strong>Medida:</strong> <span th:text="${#numbers.formatDecimal(pedido.corteTelaAncho, 1, 3) + ' x ' + #numbers.formatDecimal(pedido.corteTelaAlto, 1, 3)}"></span>m</p>
    </div>

    <div class="etiqueta">
        <h3>📏 Corte de Tubería</h3>
        <p><strong>Medida Tubo:</strong> <span th:text="${#numbers.formatDecimal(pedido.corteTuberia, 1, 3)}"></span>m</p>
        <p><strong>Tipo Tubo:</strong> <span th:text="${pedido.tuboRecomendado}"></span></p>
    </div>

    <div class="etiqueta">
        <h3>📦 Identificación Final</h3>
        <p><strong>Cliente:</strong> <span th:text="${pedido.nombreCliente}"></span></p>
        <p><strong>Descripción:</strong> <span th:text="${pedido.descripcion}"></span></p>
        <p><strong>Medida Final:</strong> <span th:text="${pedido.ancho + 'm x ' + pedido.altura + 'm'}"></span></p>
        <p><strong>Control:</strong> <span th:text="${pedido.tipoControl}"></span></p>
        <p><strong>Cuerda:</strong> <span class="destacado" th:text="${pedido.medidaCuerda}"></span></p>
    </div>

</body>
</html>
