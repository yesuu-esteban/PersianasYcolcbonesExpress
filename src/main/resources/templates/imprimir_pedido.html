<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Orden de Fabricación</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 16px;
            background: #fff;
        }
        .etiqueta {
            border: 2px solid #000;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 14px;
            width: 360px;
            page-break-inside: avoid;
        }
        .etiqueta h3 {
            font-size: 1rem;
            font-weight: 700;
            border-bottom: 2px solid #333;
            padding-bottom: 6px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .etiqueta p {
            font-size: 0.92rem;
            margin-bottom: 4px;
            line-height: 1.4;
        }
        .etiqueta p strong {
            display: inline-block;
            min-width: 120px;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 700;
            color: #fff;
        }
        .badge-con { background-color: #198754; }
        .badge-sin { background-color: #212529; }
        .valor-mando {
            font-size: 1.1rem;
            font-weight: 700;
            color: #c0392b;
        }
        .fila-cabezal {
            background-color: #e8f5e9;
            border-left: 3px solid #198754;
            border-radius: 3px;
            padding: 4px 8px;
            margin-top: 6px;
            font-size: 0.92rem;
        }
        .fila-cabezal strong {
            display: inline-block;
            min-width: 120px;
        }
        @media print {
            body { padding: 0; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

    <!-- ETIQUETA 1: Identificación -->
    <div class="etiqueta">
        <h3>📦 Identificación</h3>
        <p><strong>Distribuidor:</strong>  <span th:text="${pedido.nombreDecorador}"></span></p>
        <p><strong>Cliente final:</strong> <span th:text="${pedido.nombreClienteFinal}"></span></p>
        <p><strong>Descripción:</strong>   <span th:text="${pedido.descripcion}"></span></p>
        <p><strong>Medida final:</strong>
            <span th:text="${#numbers.formatDecimal(pedido.ancho,1,2) + 'm  x  ' + #numbers.formatDecimal(pedido.altura,1,2) + 'm'}"></span>
        </p>
        <p><strong>Sistema:</strong>
            <span class="badge"
                  th:classappend="${pedido.usaCabezal} ? 'badge-con' : 'badge-sin'"
                  th:text="${pedido.tipoSistema}">
            </span>
        </p>
        <p><strong>Mando:</strong>   <span class="valor-mando" th:text="${pedido.ladoControl}"></span></p>
        <p><strong>Cuerda:</strong>  <span th:text="${pedido.medidaCuerda}"></span></p>
        <p><strong>Control:</strong> <span th:text="${pedido.tipoControl}"></span></p>
    </div>

    <!-- ETIQUETA 2: Corte de tela -->
    <div class="etiqueta">
        <h3>✂️ Corte de Tela</h3>
        <p><strong>Color:</strong> <span th:text="${pedido.colorTelaDeseado}"></span></p>
        <p><strong>Medida corte:</strong>
            <span th:text="${#numbers.formatDecimal(pedido.corteTelaAncho,1,3)
                          + ' m  x  '
                          + #numbers.formatDecimal(pedido.corteTelaAlto,1,3) + ' m'}"></span>
        </p>
    </div>

    <!-- ETIQUETA 3: Perfilería
         Con cabezal  → medida = ancho - 0.030 m  |  pesa = R24
         Sin cabezal  → medida = ancho - 0.025 m  |  pesa según tamaño (R16 o R24)
         Medida cabezal (solo si aplica) = ancho - 0.020 m
    -->
    <div class="etiqueta">
        <h3>📐 Perfilería</h3>
        <!--
            "Tubo (R24): 1.970 m"  → el tipo entre paréntesis, la medida de corte como valor
            Con cabezal  → ancho - 0.030 m | siempre R24
            Sin cabezal  → ancho - 0.025 m | R16 o R24 según dimensiones
        -->
        <p>
            <strong>Tubo (<span th:text="${pedido.tuboRecomendado}"></span>):</strong>
            <span th:text="${#numbers.formatDecimal(pedido.corteTuberia,1,3) + ' m'}"></span>
        </p>
        <p>
            <strong>Pesa:</strong>
            <span th:text="${#numbers.formatDecimal(pedido.corteTuberia,1,3) + ' m'}"></span>
        </p>

        <!-- Medida del cabezal: SOLO aparece si el pedido lleva cabezal -->
        <div class="fila-cabezal" th:if="${pedido.usaCabezal}">
            <strong>Medida cabezal:</strong>
            <span th:text="${#numbers.formatDecimal(pedido.medidaCabezal,1,3) + ' m'}"></span>
        </div>
    </div>

    <!-- ETIQUETA CLIENTE FINAL -->
    <div class="etiqueta">
        <h3>🏠  Cliente</h3>
        <p><strong>Cliente:</strong> <span th:text="${pedido.nombreClienteFinal}"></span></p>
        <p><strong>Descripción:</strong> <span th:text="${pedido.descripcion}"></span></p>
        <p><strong>Medida final:</strong> <span th:text="${#numbers.formatDecimal(pedido.ancho,1,2) + 'm  x  ' + #numbers.formatDecimal(pedido.altura,1,2) + 'm'}"></span></p>
        <p><strong>Mando:</strong> <span class="valor-mando" th:text="${pedido.ladoControl}"></span></p>
        <p><strong>Cuerda:</strong> <span th:text="${pedido.medidaCuerda}"></span></p>
    </div>

    <div class="no-print" style="margin-top:10px;">
        <button onclick="window.print()"
                style="padding:8px 20px;font-size:0.9rem;cursor:pointer;border:1px solid #333;border-radius:4px;background:#212529;color:#fff;">
            🖨️ Imprimir
        </button>
    </div>

</body>
</html>
