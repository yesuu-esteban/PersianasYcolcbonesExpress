<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Taller | Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-size: 0.8rem; }
        .table-small { font-size: 0.75rem; }
        .btn-xs { padding: 0.1rem 0.3rem; font-size: 0.7rem; }
        .compact-box { padding: 2px 5px; border-left: 3px solid #6c757d; background: #fdfdfd; line-height: 1.1; }
        .nav-link { padding: 0.3rem 0.6rem !important; font-size: 0.8rem; }
    </style>
</head>
<body class="bg-light p-2">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="m-0 fw-bold">📋 Órdenes de Fabricación</h6>
            <div class="d-flex gap-1">
                <a href="/reportes" class="btn btn-xs btn-outline-success">📊 Reportes</a>
                <a href="/inventario" class="btn btn-xs btn-outline-dark">📦 Inventario</a>
                <a href="/taller/nuevo" class="btn btn-xs btn-primary">+ Nuevo</a>
            </div>
        </div>

        <table class="table table-bordered table-hover shadow-sm bg-white align-middle table-small m-0">
            <thead class="table-dark">
                <tr>
                    <th>Cliente</th>
                    <th>Sistema</th>
                    <th>Medidas</th>
                    <th>Ficha Técnica</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${pedidos}">
                    <td class="fw-bold" th:text="${p.nombreClienteFinal}"></td>
                    <td><span class="badge bg-dark" th:text="${p.tipoSistema}"></span></td>
                    <td><strong th:text="${p.ancho + 'x' + p.altura}"></strong></td>
                    <td>
                        <div class="compact-box">
                            Tela: <span th:text="${#numbers.formatDecimal(p.corteTelaAncho, 1, 2) + 'x' + #numbers.formatDecimal(p.corteTelaAlto, 1, 2)}"></span><br>
                            Rollo: <span th:text="${p.rolloTela}"></span>
                        </div>
                    </td>
                    <td><span class="badge bg-secondary" th:text="${p.estado}"></span></td>
                    <td>
                        <div class="btn-group">
                            <form th:action="@{/taller/actualizar/{id}/tela(id=${p.id})}" method="post">
                                <button type="submit" class="btn btn-xs btn-outline-info">Tela</button>
                            </form>
                            <a th:href="@{/taller/imprimir/{id}(id=${p.id})}" target="_blank" class="btn btn-xs btn-dark">🖨️</a>
                            <a th:href="@{/taller/editar/{id}(id=${p.id})}" class="btn btn-xs btn-outline-primary">✏️</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
