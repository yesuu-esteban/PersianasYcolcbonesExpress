<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cargar Stock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container col-md-6">
        <div class="d-flex justify-content-between align-items-start mb-1">
            <h2 class="mb-0">+ Cargar Stock</h2>
            <a th:href="@{/inventario/insumo/{id}/editar(id=${insumo.id})}" class="btn btn-sm btn-outline-secondary">✏️ Editar insumo</a>
        </div>
        <p class="text-muted mb-4">Insumo: <strong th:text="${insumo.nombre}"></strong></p>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/inventario/insumo/{id}/cargar(id=${insumo.id})}" method="post" class="bg-white p-4 shadow-sm border rounded">

            <!-- Caso: insumo CON medida (tubo, cuerda, pesa) -->
            <div th:if="${insumo.tieneMedida}">
                <div class="mb-3">
                    <label class="form-label fw-bold">Largo de cada pieza (metros)</label>
                    <input type="number" step="0.01" name="largo" class="form-control" placeholder="Ej: 6.00" required>
                    <small class="text-muted">Cuánto mide la barra/pieza que llegó, antes de cortarla.</small>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Cantidad de piezas idénticas</label>
                    <input type="number" name="cantidadPiezas" class="form-control" value="1" min="1" required>
                </div>
            </div>

            <!-- Caso: insumo SIN medida (control) -->
            <div th:unless="${insumo.tieneMedida}">
                <p>Stock actual: <strong th:text="${insumo.stockUnidades} + ' unidad(es)'"></strong></p>
                <div class="mb-3">
                    <label class="form-label fw-bold">Unidades a agregar</label>
                    <input type="number" name="unidades" class="form-control" placeholder="Ej: 10" min="1" required>
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success w-100">Agregar al inventario</button>
                <a href="/inventario" class="btn btn-secondary w-100 mt-2">Cancelar</a>
            </div>
        </form>

        <!-- ───────── Zona de eliminación, separada para evitar clics accidentales ───────── -->
        <div class="mt-4 p-3 border border-danger-subtle rounded" style="background:#fff5f5;">
            <p class="mb-2 fw-bold text-danger">Eliminar insumo</p>
            <p class="text-muted mb-2" style="font-size:0.85rem;">
                Esto borra <strong th:text="${insumo.nombre}"></strong> del catálogo de insumos
                <span th:if="${insumo.tieneMedida}">junto con todas sus piezas registradas</span>
                de forma permanente.
            </p>
            <form th:action="@{/inventario/insumo/eliminar/{id}(id=${insumo.id})}" method="post"
                  th:data-tiene-medida="${insumo.tieneMedida}"
                  th:data-nombre="${insumo.nombre}"
                  th:data-stock="${insumo.stockUnidades}"
                  id="formEliminarInsumo">
                <button type="submit" class="btn btn-outline-danger w-100">🗑️ Eliminar insumo permanentemente</button>
            </form>
        </div>
    </div>

    <script>
        // Confirmación reforzada: si el insumo tiene piezas o stock cargado,
        // se avisa explícitamente antes de permitir el borrado (se permite siempre,
        // pero se asegura de que quien borra sepa que hay datos asociados).
        (function () {
            const form = document.getElementById('formEliminarInsumo');
            if (!form) return;

            form.addEventListener('submit', function (e) {
                const nombre = form.dataset.nombre || 'este insumo';
                const tieneMedida = form.dataset.tieneMedida === 'true';
                const stock = parseInt(form.dataset.stock || '0', 10);

                let mensaje = `¿Eliminar "${nombre}" del inventario? Esta acción no se puede deshacer.`;

                if (tieneMedida) {
                    mensaje = `⚠ "${nombre}" puede tener piezas registradas.\n` +
                              `Si lo eliminas, también se borrarán TODAS sus piezas asociadas.\n\n` +
                              `¿Deseas continuar?`;
                } else if (stock > 0) {
                    mensaje = `⚠ "${nombre}" todavía tiene ${stock} unidad(es) en stock.\n` +
                              `Si lo eliminas, se perderá ese registro de stock.\n\n` +
                              `¿Deseas continuar?`;
                }

                if (!window.confirm(mensaje)) {
                    e.preventDefault();
                }
            });
        })();
    </script>
</body>
</html>
