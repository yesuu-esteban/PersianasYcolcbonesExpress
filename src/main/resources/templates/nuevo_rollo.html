<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agregar Rollo de Tela</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container col-md-6">
        <h2 class="mb-4">🧵 Agregar Rollo de Tela</h2>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/inventario/rollo/nuevo}" method="post" class="bg-white p-4 shadow-sm border rounded">

            <div class="mb-3">
                <label class="form-label fw-bold">Color</label>
                <select name="color" class="form-select" required>
                    <option th:each="c : ${colores}" th:value="${c}" th:text="${c}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Ancho del rollo</label>
                <select name="ancho" class="form-select" required>
                    <option th:each="a : ${anchos}" th:value="${a}" th:text="${a + ' metros'}"></option>
                </select>
                <small class="text-muted">Todos los rollos nuevos ingresan con 30 metros de largo.</small>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Cantidad de rollos a agregar</label>
                <input type="number" name="cantidad" class="form-control" value="1" min="1" required>
                <small class="text-muted">Si llegaron varios rollos idénticos, indícalo aquí para no repetir el formulario.</small>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success w-100">Agregar al inventario</button>
                <a href="/inventario" class="btn btn-secondary w-100 mt-2">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
