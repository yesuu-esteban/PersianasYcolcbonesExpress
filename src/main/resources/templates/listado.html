<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pedidos de Tienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>🛒 Pedidos de Tienda</h2>
            <a href="/tienda/nuevo" class="btn btn-primary">+ Nuevo Pedido</a>
        </div>

        <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <table class="table table-hover shadow-sm bg-white align-middle">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Cliente</th>
                    <th>Teléfono</th>
                    <th>Vendedor</th>
                    <th>Fecha pedido</th>
                    <th>Total</th>
                    <th>Abono</th>
                    <th>Saldo</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${pedidos}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.nombreCliente}"></td>
                    <td th:text="${p.telefono}"></td>
                    <td th:text="${p.vendedor}"></td>
                    <td th:text="${#temporals.format(p.fechaPedido, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${p.total}"></td>
                    <td th:text="${p.abono}"></td>
                    <td th:text="${p.saldo}"></td>
                    <td>
                        <span class="badge bg-secondary" th:text="${p.estado}"></span>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(pedidos)}" class="alert alert-light border text-center text-muted">
            No hay pedidos de tienda registrados todavía.
        </div>
    </div>
</body>
</html>
