<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Pedido Masivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container col-md-11">
        <h2 class="mb-4">➕ Registrar Pedido del Cliente</h2>
        
        <form th:action="@{/taller/guardar-lista}" method="post" class="bg-white p-4 shadow-sm border rounded">
            
            <div class="mb-4">
                <label class="form-label fw-bold">Nombre del Cliente</label>
                <input type="text" name="nombreCliente" class="form-control" required>
            </div>
            
            <hr>
            <h6>Detalle de Productos:</h6>
            <div id="contenedor-productos">
                <div class="row mb-2">
                    <div class="col-md-3"><input type="text" name="descripciones" class="form-control" placeholder="Descripción" required></div>
                    <div class="col-md-1"><input type="number" name="cantidades" class="form-control" value="1" min="1" required></div>
                    <div class="col-md-2"><input type="number" step="0.01" name="anchos" class="form-control" placeholder="Ancho (m)" required></div>
                    <div class="col-md-2"><input type="number" step="0.01" name="alturas" class="form-control" placeholder="Alto (m)" required></div>
                    <div class="col-md-2">
                        <select name="colores" class="form-select">
                            <option th:each="c : ${listaColores}" th:value="${c}" th:text="${c}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select name="controles" class="form-select">
                            <option value="Derecho">Control Derecho</option>
                            <option value="Izquierdo">Control Izquierdo</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <button type="button" class="btn btn-info btn-sm mt-2" onclick="agregarFila()">+ Agregar otro producto</button>
            
            <div class="mt-4">
                <button type="submit" class="btn btn-success w-100">Guardar todos los pedidos</button>
                <a href="/taller/pedidos" class="btn btn-secondary w-100 mt-2">Cancelar</a>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        const listaColores = /*[[${listaColores}]]*/ [];

        function agregarFila() {
            const contenedor = document.getElementById('contenedor-productos');
            let opcionesHTML = listaColores.map(c => `<option value="${c}">${c}</option>`).join("");

            const fila = `
                <div class="row mb-2">
                    <div class="col-md-3"><input type="text" name="descripciones" class="form-control" placeholder="Descripción" required></div>
                    <div class="col-md-1"><input type="number" name="cantidades" class="form-control" value="1" min="1" required></div>
                    <div class="col-md-2"><input type="number" step="0.01" name="anchos" class="form-control" placeholder="Ancho (m)" required></div>
                    <div class="col-md-2"><input type="number" step="0.01" name="alturas" class="form-control" placeholder="Alto (m)" required></div>
                    <div class="col-md-2">
                        <select name="colores" class="form-select">${opcionesHTML}</select>
                    </div>
                    <div class="col-md-2">
                        <select name="controles" class="form-select">
                            <option value="Derecho">Control Derecho</option>
                            <option value="Izquierdo">Control Izquierdo</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <button type="button" class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove()">X</button>
                    </div>
                </div>`;
            contenedor.insertAdjacentHTML('beforeend', fila);
        }
    </script>
</body>
</html>
