<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Pedido Masivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .col-cabezal { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-light p-4">
    <div class="container col-md-11">
        <h2 class="mb-4">➕ Registrar Pedido</h2>

        <form th:action="@{/taller/guardar-lista}" method="post" class="bg-white p-4 shadow-sm border rounded">

            <div class="row mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Nombre del Distribuidor</label>
                    <input type="text" name="nombreDecorador" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Nombre del Cliente Final</label>
                    <input type="text" name="nombreClienteFinal" class="form-control" required>
                </div>
            </div>

            <hr>

            <!-- Cabecera de columnas -->
            <div class="row mb-1 px-1">
                <div class="col-md-3"><small class="fw-bold text-muted">Descripción</small></div>
                <div class="col-md-1"><small class="fw-bold text-muted">Cant.</small></div>
                <div class="col-md-1"><small class="fw-bold text-muted">Ancho</small></div>
                <div class="col-md-1"><small class="fw-bold text-muted">Alto</small></div>
                <div class="col-md-2"><small class="fw-bold text-muted">Color</small></div>
                <div class="col-md-2"><small class="fw-bold text-muted">Mando</small></div>
                <div class="col-md-1 text-center"><small class="fw-bold text-muted">Cabezal</small></div>
                <div class="col-md-1"></div>
            </div>

            <div id="contenedor-productos">
                <!-- Fila 0: índice fijo = 0 -->
                <div class="row mb-2 align-items-center fila-producto">
                    <div class="col-md-3">
                        <input type="text" name="descripciones" class="form-control" placeholder="Descripción" required>
                    </div>
                    <div class="col-md-1">
                        <input type="number" name="cantidades" class="form-control" value="1" min="1" required>
                    </div>
                    <div class="col-md-1">
                        <input type="number" step="0.01" name="anchos" class="form-control" placeholder="m" required>
                    </div>
                    <div class="col-md-1">
                        <input type="number" step="0.01" name="alturas" class="form-control" placeholder="m" required>
                    </div>
                    <div class="col-md-2">
                        <select name="colores" class="form-select">
                            <option th:each="c : ${listaColores}" th:value="${c}" th:text="${c}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select name="mandos" class="form-select">
                            <option value="Mando Derecho">Mando Derecho</option>
                            <option value="Mando Izquierdo">Mando Izquierdo</option>
                        </select>
                    </div>
                    <div class="col-md-1 col-cabezal">
                        <!--
                            value="true" es CLAVE:
                            - Marcado   → envía cabezales[0]=true  → el controlador lee "true" → tieneCabezal=true
                            - Desmarcado → NO envía nada           → el controlador lee "false" (por defecto) → tieneCabezal=false
                        -->
                        <input type="checkbox" name="cabezales[0]" value="true" class="form-check-input fs-5">
                    </div>
                    <div class="col-md-1"></div>
                </div>
            </div>

            <button type="button" class="btn btn-info btn-sm mt-2" onclick="agregarFila()">+ Agregar otro producto</button>

            <div class="mt-4">
                <button type="submit" class="btn btn-success w-100">Guardar todos los pedidos</button>
                <a href="/taller/pedidos" class="btn btn-secondary w-100 mt-2">Cancelar</a>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        const listaColores = /*[[${listaColores}]]*/ [];
        let filaIndex = 1;

        function agregarFila() {
            const contenedor = document.getElementById('contenedor-productos');
            const idx = filaIndex;
            const opcionesHTML = listaColores.map(c => `<option value="${c}">${c}</option>`).join('');

            const fila = `
                <div class="row mb-2 align-items-center fila-producto">
                    <div class="col-md-3">
                        <input type="text" name="descripciones" class="form-control" placeholder="Descripción" required>
                    </div>
                    <div class="col-md-1">
                        <input type="number" name="cantidades" class="form-control" value="1" min="1" required>
                    </div>
                    <div class="col-md-1">
                        <input type="number" step="0.01" name="anchos" class="form-control" placeholder="m" required>
                    </div>
                    <div class="col-md-1">
                        <input type="number" step="0.01" name="alturas" class="form-control" placeholder="m" required>
                    </div>
                    <div class="col-md-2">
                        <select name="colores" class="form-select">${opcionesHTML}</select>
                    </div>
                    <div class="col-md-2">
                        <select name="mandos" class="form-select">
                            <option value="Mando Derecho">Mando Derecho</option>
                            <option value="Mando Izquierdo">Mando Izquierdo</option>
                        </select>
                    </div>
                    <div class="col-md-1 col-cabezal">
                        <input type="checkbox" name="cabezales[${idx}]" value="true" class="form-check-input fs-5">
                    </div>
                    <div class="col-md-1">
                        <button type="button" class="btn btn-danger btn-sm"
                                onclick="this.closest('.fila-producto').remove()">✕</button>
                    </div>
                </div>`;

            contenedor.insertAdjacentHTML('beforeend', fila);
            filaIndex++;
        }
    </script>
</body>
</html>
