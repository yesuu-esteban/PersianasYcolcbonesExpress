!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Pedido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .col-cabezal { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-light p-4">
    <div class="container col-md-8">
        <h2 class="mb-4">✏️ Editar Pedido #<span th:text="${pedido.id}"></span></h2>
 
        <form th:action="@{/taller/editar/{id}(id=${pedido.id})}" method="post" class="bg-white p-4 shadow-sm border rounded">
 
            <div class="row mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Nombre del Distribuidor</label>
                    <input type="text" name="nombreDecorador" class="form-control"
                           th:value="${pedido.nombreDecorador}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Nombre del Cliente Final</label>
                    <input type="text" name="nombreClienteFinal" class="form-control"
                           th:value="${pedido.nombreClienteFinal}" required>
                </div>
            </div>
 
            <div class="row mb-4">
                <div class="col-md-12">
                    <label class="form-label fw-bold">Descripción</label>
                    <input type="text" name="descripcion" class="form-control"
                           th:value="${pedido.descripcion}" required>
                </div>
            </div>
 
            <hr>
 
            <div class="row mb-4 align-items-center">
                <div class="col-md-2">
                    <label class="form-label fw-bold">Ancho (m)</label>
                    <input type="number" step="0.01" name="ancho" class="form-control"
                           th:value="${pedido.ancho}" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-bold">Alto (m)</label>
                    <input type="number" step="0.01" name="altura" class="form-control"
                           th:value="${pedido.altura}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Color</label>
                    <select name="colorTelaDeseado" class="form-select">
                        <option th:each="c : ${listaColores}"
                                th:value="${c}"
                                th:text="${c}"
                                th:selected="${c == pedido.colorTelaDeseado}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Mando</label>
                    <select name="ladoControl" class="form-select">
                        <option value="Mando Derecho" th:selected="${pedido.ladoControl == 'Mando Derecho'}">Mando Derecho</option>
                        <option value="Mando Izquierdo" th:selected="${pedido.ladoControl == 'Mando Izquierdo'}">Mando Izquierdo</option>
                    </select>
                </div>
                <div class="col-md-2 col-cabezal">
                    <label class="form-label fw-bold">Cabezal</label>
                    <!--
                        Igual que en nuevo_pedido: value="true" es clave.
                        Marcado    → envía usaCabezal=true
                        Desmarcado → no envía nada → el controlador usa defaultValue="false"
                    -->
                    <input type="checkbox" name="usaCabezal" value="true" class="form-check-input fs-5"
                           th:checked="${pedido.usaCabezal}">
                </div>
            </div>
 
            <div class="mt-4">
                <button type="submit" class="btn btn-success w-100">Guardar cambios</button>
                <a href="/taller/pedidos" class="btn btn-secondary w-100 mt-2">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
